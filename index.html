<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon</title>
  <meta name="description" content="Highlanders Nature Trails is launching soon." />
  <style>
    :root {
      --primary: #4caf50;
      --primary-dark: #43a047;
      --ink: #161616;
      --muted: rgba(22, 22, 22, 0.7);
      --card: rgba(255, 255, 255, 0.86);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--ink);
      background:
        radial-gradient(1200px 800px at 10% 10%, rgba(76, 175, 80, 0.20), transparent 55%),
        radial-gradient(900px 650px at 90% 30%, rgba(139, 195, 74, 0.18), transparent 50%),
        linear-gradient(180deg, #f7fff8, #ffffff);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: center;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(76, 175, 80, 0.25);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.06);
      padding: 26px 22px;
      backdrop-filter: blur(8px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(76, 175, 80, 0.10);
      border: 1px solid rgba(76, 175, 80, 0.18);
      color: var(--primary-dark);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 13px;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .cta {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
      border: 1px solid rgba(76, 175, 80, 0.35);
      background: rgba(76, 175, 80, 0.12);
      color: var(--primary-dark);
      transition: transform 120ms ease, background 120ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(76, 175, 80, 0.16);
    }

    .small {
      margin-top: 14px;
      font-size: 13px;
      color: rgba(22, 22, 22, 0.55);
    }

    @media (min-width: 900px) {
      .card { padding: 30px 28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Coming soon">
      <div class="badge" role="status" aria-live="polite">
        <span aria-hidden="true">⏳</span>
        Coming Soon
      </div>
      <h1>Something amazing is on the way.</h1>
      <p>
        Thanks for your patience. We&rsquo;re preparing a better experience for visitors and trip planning.
        Check back soon for the full launch.
      </p>
      <div class="cta">
        <a class="btn" href="/contact">Contact us</a>
        <a class="btn" href="/privacy">View policy</a>
      </div>
      <div class="small">
        Tip: when you&rsquo;re ready, point the root route to this page or deploy the real app.
      </div>
    </section>
  </main>
</body>
</html>
